<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პიროვნული მახასიათებლების კითხვარი</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #2c3e50;
            --color-secondary: #3498db;
            --color-accent: #e74c3c;
            --color-success: #27ae60;
            --color-light: #ecf0f1;
            --color-bg: #f8f9fa;
            --color-text: #2c3e50;
            --color-border: #bdc3c7;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--color-text);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .main-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }

        .view { display: none; }
        .view.active { display: block; }

        /* Assessment Scale Guide */
        .scale-guide {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            background: var(--color-bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid var(--color-border);
        }

        .guide-item {
            text-align: center;
            font-size: 0.8rem;
            color: var(--color-primary);
        }

        .guide-num {
            display: block;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--color-secondary);
        }

        .question-group {
            margin-bottom: 30px;
            text-align: center;
        }

        .question-text {
            font-size: 1.4rem;
            color: var(--color-primary);
            margin-bottom: 25px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scale-options {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .scale-btn {
            width: 60px;
            height: 60px;
            border: 2px solid var(--color-border);
            background: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            font-weight: bold;
            transition: var(--transition);
        }

        .scale-btn:hover {
            border-color: var(--color-secondary);
            transform: translateY(-3px);
        }

        .scale-btn.selected {
            background: var(--color-secondary);
            color: white;
            border-color: var(--color-secondary);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--color-light);
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-primary { background: var(--color-secondary); color: white; }
        .btn-secondary { background: var(--color-light); color: var(--color-primary); }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .result-card {
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #ddd;
            background: #fff;
        }

        @media (max-width: 600px) {
            .scale-options { gap: 8px; }
            .scale-btn { width: 50px; height: 50px; }
            .scale-guide { grid-template-columns: 1fr; text-align: left; }
            .guide-item { display: flex; align-items: center; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 პიროვნული კითხვარი</h1>
        </header>

        <div class="main-content">
            <div id="surveyView" class="view active">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div id="progressText" style="text-align: right; margin-bottom: 20px; font-size: 0.9rem;">კითხვა 1 / 100</div>

                <div class="scale-guide">
                    <div class="guide-item"><span class="guide-num">0</span>საერთოდ არ მახასიათებს</div>
                    <div class="guide-item"><span class="guide-num">1</span>იშვიათად</div>
                    <div class="guide-item"><span class="guide-num">2</span>ზოგჯერ</div>
                    <div class="guide-item"><span class="guide-num">3</span>ხშირად</div>
                    <div class="guide-item"><span class="guide-num">4</span>ყოველთვის</div>
                </div>

                <div class="question-group">
                    <div id="questionText" class="question-text">იტვირთება...</div>
                    <div class="scale-options">
                        <button class="scale-btn" onclick="selectScore(0)">0</button>
                        <button class="scale-btn" onclick="selectScore(1)">1</button>
                        <button class="scale-btn" onclick="selectScore(2)">2</button>
                        <button class="scale-btn" onclick="selectScore(3)">3</button>
                        <button class="scale-btn" onclick="selectScore(4)">4</button>
                    </div>
                </div>

                <div class="navigation">
                    <button class="btn btn-secondary" id="prevBtn" onclick="prevQ()">← წინა</button>
                    <button class="btn btn-primary" id="nextBtn" onclick="nextQ()">შემდეგი →</button>
                </div>
            </div>

            <div id="resultsView" class="view">
                <h2 style="text-align: center; margin-bottom: 30px;">ანალიზის შედეგები</h2>
                <div class="results-grid" id="resultsGrid"></div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 30px;" onclick="location.reload()">თავიდან დაწყება</button>
            </div>
        </div>
    </div>

    <script>
        const rawData = [
            { name: "პარანოიდული", qs: ["ხშირად ვეჭვობ, რომ სხვებს ჩემს მიმართ ცუდი ზრახვები აქვთ", "მიჭირს ადამიანების ნდობა, თუნდაც ახლობლების", "ნეიტრალურ ქცევაშიც კი ხშირად ვხედავ საფრთხეს", "კრიტიკას აღვიქვამ როგორც პირად შეტევას", "დიდხანს ვინახავ წყენას", "მეშინია, რომ სხვები ჩემს წინააღმდეგ გამოიყენებენ ინფორმაციას", "ხშირად ვეჭვიანობ პარტნიორზე საფუძვლის გარეშე", "მგონია, რომ სხვები ჩემს ზურგს უკან საუბრობენ", "ფრთხილად ვუზიარებ პირად ინფორმაციას", "ხშირად ვამოწმებ სხვების ქცევას შესაძლო მოტყუების ნიშნებზე"] },
            { name: "შიზოიდური", qs: ["მირჩევნია მარტო ყოფნა", "იშვიათად მსურს ახლო ურთიერთობები", "ემოციური გამოხატვა შეზღუდულია ჩემში", "სექსუალური ინტერესი დაბალია", "სიამოვნებას ვიღებ მხოლოდ მარტო ყოფნისას", "კრიტიკა ან ქება ნაკლებად მოქმედებს ჩემზე", "ვგრძნობ ემოციურ დისტანციას სხვებისგან", "მეგობრების ძალიან მცირე წრე მაქვს", "ხშირად ვირჩევ იზოლაციას", "სხვები მეუბნებიან, რომ 'ცივი' ვარ"] },
            { name: "შიზოტიპური", qs: ["მაქვს უცნაური ან მაგიური რწმენები", "ვამჩნევ 'ნიშნებს', რომლებიც თითქოს ჩემთანაა დაკავშირებული", "ჩემი აზროვნება სხვებისთვის უცნაურია", "მეტყველება ზოგჯერ არალოგიკურია", "სოციალური შფოთვა მაქვს ურთიერთობებში", "მაქვს უცნაური აღქმები", "ქცევა ან გარეგნობა ექსცენტრულია", "ახლო მეგობრები თითქმის არ მყავს", "სხვებს ვეჩვენები უცნაურად", "ვგრძნობ, რომ სხვები მაკვირდებიან"] },
            { name: "ანტისოციალური", qs: ["წესებს ხშირად ვარღვევ", "ვმოქმედებ შედეგებზე ფიქრის გარეშე", "ადვილად ვატყუებ სხვებს", "ვმანიპულირებ ადამიანებით", "აგრესიული ქცევა მქონია", "პასუხისმგებლობას ხშირად ვერ ვიღებ", "სინანული ნაკლებად მაქვს", "რისკიანი ქცევები მიზიდავს", "სხვების უფლებებს ნაკლებად ვითვალისწინებ", "იმპულსურად ვიქცევი"] },
            { name: "ბორდერლაინი", qs: ["ემოციები სწრაფად მეცვლება", "მეშინია მიტოვების", "ურთიერთობები ინტენსიური და არასტაბილურია", "საკუთარი თავის აღქმა იცვლება", "იმპულსური ქცევები მაქვს", "თავს ხშირად ცარიელად ვგრძნობ", "ძლიერი ბრაზი მიჩნდება", "სტრესის დროს პარანოიდული აზრები მაქვს", "თვითდაზიანების აზრები მქონია", "უეცარი განწყობის ცვლილებები მაქვს"] },
            { name: "ჰისტრიონული", qs: ["ყურადღების ცენტრში ყოფნა მსიამოვნებს", "ემოციებს დრამატულად გამოვხატავ", "ვცდილობ შთაბეჭდილების მოხდენას გარეგნობით", "სწრაფად ვერთვები ემოციურად", "ურთიერთობები ზედაპირულია", "ადვილად ვექცევი გავლენის ქვეშ", "მეტყველება ხშირად ზედაპირულია", "ემოციები სწრაფად იცვლება", "ყურადღების ნაკლებობა მაწუხებს", "სხვების შეფასება ჩემზე მოქმედებს"] },
            { name: "ნარცისული", qs: ["თავს განსაკუთრებულად ვთვლი", "მჭირდება აღიარება", "კრიტიკა მტკენს", "სხვებზე უპირატესობას ვგრძნობ", "ემპათია მიჭირს", "ვფიქრობ, განსაკუთრებულ მოპყრობას ვიმსახურებ", "წარმატებაზე ხშირად ვფიქრობ", "ვიყენებ სხვებს მიზნისთვის", "შური მაქვს სხვების მიმართ", "სხვებს შურთ ჩემი"] },
            { name: "ამრიდებლური", qs: ["თავს ვარიდებ სოციალურ სიტუაციებს", "მეშინია კრიტიკის", "თავს არასრულფასოვნად ვგრძნობ", "ახალი ურთიერთობები მაშინებს", "უარყოფის შიში მაქვს", "მხოლოდ უსაფრთხო გარემოში ვიხსნები", "ხშირად თავს ვიკავებ საუბრისგან", "სოციალური შფოთვა მაწუხებს", "თავს სხვებზე დაბლა ვაყენებ", "მეშინია დამცირების"] },
            { name: "დამოკიდებული", qs: ["მიჭირს დამოუკიდებელი გადაწყვეტილებები", "ხშირად ვეყრდნობი სხვებს", "მარტო ყოფნა მაშინებს", "მეშინია მხარდაჭერის დაკარგვის", "ვეთანხმები სხვებს კონფლიქტის ასარიდებლად", "ვთმობ საკუთარ საჭიროებებს", "ახალი პასუხისმგებლობა მაშინებს", "მჭირდება მუდმივი მხარდაჭერა", "ურთიერთობებში დამოკიდებული ვარ", "მეშინია მიტოვების"] },
            { name: "ობსესიური", qs: ["პერფექციონიზმი მაკავებს", "დეტალებზე ზედმეტად ვფოკუსირდები", "მიჭირს დელეგირება", "წესები ჩემთვის ძალიან მნიშვნელოვანია", "მოქნილობა მიჭირს", "მუშაობას ვანიჭებ უპირატესობას", "კონტროლის დაკარგვა მაშინებს", "სტანდარტები მაღალი მაქვს", "სხვებისგან სრულყოფილებას ველი", "წესრიგი აუცილებელია"] }
        ];

        let questions = [];
        rawData.forEach(category => {
            category.qs.forEach(q => questions.push({ text: q, catName: category.name }));
        });

        let currentIdx = 0;
        let answers = new Array(questions.length).fill(null);

        function render() {
            document.getElementById('questionText').innerText = questions[currentIdx].text;
            document.getElementById('progressText').innerText = `კითხვა ${currentIdx + 1} / ${questions.length}`;
            document.getElementById('progressFill').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
            
            const btns = document.querySelectorAll('.scale-btn');
            btns.forEach((btn, i) => {
                btn.classList.toggle('selected', answers[currentIdx] === i);
            });

            document.getElementById('prevBtn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
            document.getElementById('nextBtn').innerText = currentIdx === questions.length - 1 ? 'დასრულება' : 'შემდეგი →';
        }

        window.selectScore = (val) => {
            answers[currentIdx] = val;
            render();
            setTimeout(nextQ, 200);
        };

        window.nextQ = () => {
            if (answers[currentIdx] === null) return;
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                render();
            } else {
                showResults();
            }
        };

        window.prevQ = () => {
            if (currentIdx > 0) {
                currentIdx--;
                render();
            }
        };

        function showResults() {
            document.getElementById('surveyView').classList.remove('active');
            document.getElementById('resultsView').classList.add('active');
            
            const categoryScores = {};
            rawData.forEach(c => categoryScores[c.name] = { score: 0, max: c.qs.length * 4 });

            answers.forEach((ans, i) => {
                const cat = questions[i].catName;
                categoryScores[cat].score += ans;
            });

            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = Object.entries(categoryScores).map(([name, data]) => {
                const perc = (data.score / data.max) * 100;
                return `
                    <div class="result-card">
                        <div style="font-weight: bold; margin-bottom: 10px;">${name}</div>
                        <div style="font-size: 1.2rem; color: var(--color-secondary);">${data.score} / ${data.max}</div>
                        <div style="background: #eee; height: 6px; border-radius: 3px; margin: 10px 0;">
                            <div style="width: ${perc}%; background: ${perc > 35 ? 'var(--color-accent)' : 'var(--color-success)'}; height: 100%; border-radius: 3px;"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        render();
    </script>
</body>
</html>
